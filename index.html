<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swift Express Logistics</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
text-align:center;
}

/* HEADER */
header{
background:#111c33;
padding:20px;
font-size:22px;
font-weight:bold;
}

/* HERO */
.hero{
padding:60px 20px;
background:url("https://images.unsplash.com/photo-1601597111158-2fceff292cdc") center/cover;
}

input,button{
padding:12px;
margin:6px;
border:none;
border-radius:6px;
}

button{
background:#00aaff;
color:white;
cursor:pointer;
}

/* BOX */
.box{
background:#111c33;
padding:20px;
width:280px;
margin:auto;
border-radius:10px;
}

/* DASHBOARD */
#dashboard{
display:none;
padding:20px;
}

/* FLOATING BUTTONS */
.telegram,.email{
position:fixed;
right:20px;
padding:12px;
border-radius:50%;
color:white;
text-decoration:none;
}

.telegram{bottom:20px;background:#0088cc;}
.email{bottom:80px;background:#ff4d4d;}

/* CHATBOT */
.chatbot{
position:fixed;
left:20px;
bottom:20px;
width:240px;
background:#111c33;
border-radius:10px;
overflow:hidden;
}

.chat-header{
background:#00aaff;
padding:10px;
}

.chat-body{
height:140px;
overflow:auto;
padding:10px;
font-size:13px;
}
</style>
</head>

<body>

<header>Swift Express Logistics</header>

<!-- TRACKING -->
<section class="hero">
<h1>Track Your Shipment</h1>

<input id="trackInput" placeholder="Enter Tracking Number">
<button onclick="track()">Track</button>

<p id="trackResult"></p>
</section>

<!-- LOGIN -->
<section>
<div class="box">
<h3>Admin Login</h3>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p onclick="resetPass()" style="color:#00aaff;cursor:pointer;">
Forgot Password?
</p>
</div>
</section>

<!-- DASHBOARD -->
<section id="dashboard">
<h2>Admin Dashboard</h2>

<input id="newTrack" placeholder="Add Tracking Number">
<button onclick="addTrack()">Add</button>

<ul id="list"></ul>
</section>

<!-- FLOATING CONTACT -->
<a class="telegram" href="https://t.me/18323597616" target="_blank">Telegram</a>
<a class="email" href="mailto:marcuslewis776@gmail.com">Email</a>

<!-- CHATBOT -->
<div class="chatbot">
<div class="chat-header">AI Support</div>
<div id="chat" class="chat-body"></div>
<input id="msg" placeholder="Ask..." onkeydown="if(event.key==='Enter') send()">
</div>

<script>
let db = ["SEL1001","SEL2002","SEL3003"];

/* TRACK */
function track(){
let val=document.getElementById("trackInput").value;

if(db.includes(val)){
document.getElementById("trackResult").innerText="Package in transit 🚚";
}else{
document.getElementById("trackResult").innerText="Tracking not found ❌";
}
}

/* LOGIN */
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin" && p==="1234"){
document.getElementById("dashboard").style.display="block";
alert("Welcome Admin");
}else{
alert("Wrong login");
}
}

/* RESET */
function resetPass(){
alert("Reset sent to email or Telegram");
}

/* ADD TRACK */
function addTrack(){
let val=document.getElementById("newTrack").value;
db.push(val);
load();
}

/* LIST */
function load(){
let list=document.getElementById("list");
list.innerHTML="";
db.forEach(t=>{
list.innerHTML+=`<li>${t}</li>`;
});
}
load();

/* CHATBOT */
function send(){
let msg=document.getElementById("msg").value;
let chat=document.getElementById("chat");

let reply="I can help you track shipments.";

if(msg.toLowerCase().includes("track")){
reply="Enter your tracking number above.";
}

chat.innerHTML+=`<p><b>You:</b> ${msg}</p>`;
chat.innerHTML+=`<p><b>AI:</b> ${reply}</p>`;

document.getElementById("msg").value="";
}
</script>

</body>
  </html>
